{% extends "base.html" %}

{% block title %}

{% if outlet %}
    Edit Outlet
{% else %}
    New Outlet
{% endif %}

{% endblock %}

{% block content %}

<div class="container-fluid">

    <h2 class="mb-4">

        {% if outlet %}
            Edit Outlet
        {% else %}
            New Outlet
        {% endif %}

    </h2>

    <div class="card">

        <div class="card-body">

            <form method="POST">

                <input
                    type="hidden"
                    name="csrf_token"
                    value="{{ csrf_token() }}">

                <div class="mb-3">

                    <label class="form-label">
                        Outlet Name
                    </label>

                    <input
                        type="text"
                        name="outlet_name"
                        class="form-control"
                        placeholder="Enter outlet name"
                        value="{{ outlet.outlet_name if outlet else '' }}"
                        required>

                </div>

                <div class="mb-4">

                    <label class="form-label">
                        Status
                    </label>

                    <select
                        name="is_active"
                        class="form-select">

                        <option
                            value="1"
                            {% if not outlet or outlet.is_active %}
                            selected
                            {% endif %}>
                            Active
                        </option>

                        <option
                            value="0"
                            {% if outlet and not outlet.is_active %}
                            selected
                            {% endif %}>
                            Inactive
                        </option>

                    </select>

                </div>

                <div class="d-flex gap-2">

                    <button
                        type="submit"
                        class="btn btn-success">

                        {% if outlet %}
                            Update Outlet
                        {% else %}
                            Save
                        {% endif %}

                    </button>

                    <a
                        href="{{ url_for('outlets.index') }}"
                        class="btn btn-secondary">

                        Cancel

                    </a>

                </div>

            </form>

        </div>

    </div>

</div>

{% endblock %}
