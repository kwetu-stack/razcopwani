{% extends "base.html" %}
{% block title %}Change Password | RAZCO PWANI™{% endblock %}
{% block content %}
<div class="page-header"><h1>Change Password</h1><p>Update your account password.</p></div>
<form method="post" class="card kwetu-card form-card">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
  <div class="row g-3">
    <div class="col-md-6">
      <label class="form-label">New Password</label>
      <input class="form-control" name="new_password" type="password" required minlength="6">
    </div>
    <div class="col-md-6">
      <label class="form-label">Confirm Password</label>
      <input class="form-control" name="confirm_password" type="password" required minlength="6">
    </div>
  </div>
  <button class="btn btn-cyan mt-4">Save Password</button>
</form>
{% endblock %}
