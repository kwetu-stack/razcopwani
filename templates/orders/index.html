{% extends "base.html" %}

{% block title %}RAZCO PWANI™ | Sales Order Booking{% endblock %}

{% block content %}

<div class="card shadow-sm">

    <div class="card-header">

        <h3 class="mb-0">
            RAZCO PWANI™
            <small class="text-muted">
                Sales Order Booking
            </small>
        </h3>

        <small class="text-muted">
            Book customer orders for invoicing. Submitted orders cannot be edited.
        </small>

    </div>

    <div class="card-body">

        <form method="POST">

            <input
                type="hidden"
                name="csrf_token"
                value="{{ csrf_token() }}"
            >

            <div class="row">

                <div class="col-md-4 mb-3">

                    <label class="form-label">
                        Order Number
                    </label>

                    <input
                        type="text"
                        class="form-control"
                        value="Auto Generated"
                        readonly
                    >

                </div>

                <div class="col-md-4 mb-3">

                    <label class="form-label">
                        Order Date
                    </label>

                    <input
                        type="text"
                        class="form-control"
                        value="Auto Generated"
                        readonly
                    >

                </div>

                <div class="col-md-4 mb-3">

                    <label class="form-label">
                        Sales Representative
                    </label>

                    <input
                        type="text"
                        class="form-control"
                        value="{{ current_user.username }}"
                        readonly
                    >

                </div>

            </div>

            <div class="mb-4">

                <label class="form-label">
                    Customer
                </label>

                <select
                    class="form-select"
                    name="customer_id"
                    required
                >

                    <option value="">
                        -- Select Customer --
                    </option>

                    {% for customer in customers %}

                    <option value="{{ customer.id }}">
                        {{ customer.customer_name }}
                    </option>

                    {% endfor %}

                </select>

            </div>

            <hr>

            <h5 class="mb-3">
                Products
            </h5>

            <table class="table table-bordered align-middle">

                <thead class="table-light">

                    <tr>

                        <th width="65%">
                            Product
                        </th>

                        <th width="15%">
                            Qty
                        </th>

                        <th width="20%">
                            Action
                        </th>

                    </tr>

                </thead>

                <tbody id="orderItems">

                    <tr
                        class="order-row"
                        id="templateRow"
                    >

                        <td>

                            <select
                                class="form-select"
                                name="product_id[]"
                                required
                            >

                                <option value="">
                                    -- Select Product --
                                </option>

                                {% for product in products %}

                                <option value="{{ product.id }}">
                                    {{ product.product_name }}
                                </option>

                                {% endfor %}

                            </select>

                        </td>

                        <td>

                            <input
                                type="number"
                                class="form-control"
                                name="quantity[]"
                                min="1"
                                value="1"
                                required
                            >

                        </td>

                        <td>

                            <button
                                type="button"
                                class="btn btn-outline-danger remove-row"
                                disabled
                            >
                                Remove
                            </button>

                        </td>

                    </tr>

                </tbody>

            </table>

            <button
                type="button"
                id="addProduct"
                class="btn btn-outline-primary"
            >
                + Add Product
            </button>

            <hr>

            <div class="mt-4">

                <label class="form-label">
                    Remarks
                </label>

                <textarea
                    class="form-control"
                    name="remarks"
                    rows="4"
                    placeholder="Optional remarks..."
                ></textarea>

            </div>

            <div class="mt-4">

                <button
                    type="submit"
                    class="btn btn-success"
                >
                    Submit Order
                </button>

            </div>

        </form>

    </div>

</div>

{% endblock %}

{% block scripts %}

<script>

const addButton = document.getElementById("addProduct");
const tableBody = document.getElementById("orderItems");
const templateRow = document.getElementById("templateRow");

function updateRemoveButtons() {

    const rows = document.querySelectorAll(".order-row");

    rows.forEach(function(row) {

        row.querySelector(".remove-row").disabled =
            rows.length === 1;

    });

}

addButton.addEventListener("click", function() {

    const newRow = templateRow.cloneNode(true);

    newRow.removeAttribute("id");

    newRow.querySelector("select").selectedIndex = 0;

    newRow.querySelector("input").value = 1;

    newRow.querySelector(".remove-row").disabled = false;

    tableBody.appendChild(newRow);

    updateRemoveButtons();

});

tableBody.addEventListener("click", function(e) {

    if (!e.target.classList.contains("remove-row")) {
        return;
    }

    if (document.querySelectorAll(".order-row").length === 1) {
        return;
    }

    e.target.closest(".order-row").remove();

    updateRemoveButtons();

});

updateRemoveButtons();

</script>

{% endblock %}
